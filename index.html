<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫번째 아이디어</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="세상을 바꾸는 첫 번째 생각, 내 첫번째 아이디어를 소개합니다.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Elegant light gray backgrounds */
            --bg-color-1: #f8fafc; /* Slate 50 */
            --bg-color-2: #e2e8f0; /* Slate 200 */
            --bg-color-3: #ffffff;
            
            /* Soft warm-white/indigo radial light glow */
            --accent-glow: radial-gradient(circle 600px at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(99, 102, 241, 0.08), rgba(255, 255, 255, 0.7) 70%, transparent 100%);
            
            /* Premium light card glassmorphism */
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 255, 255, 0.8);
            
            /* Deep luxurious text colors */
            --text-primary: #0f172a;   /* Slate 900 */
            --text-secondary: #475569; /* Slate 600 */
            --text-muted: #94a3b8;     /* Slate 400 */
            
            /* Luxurious Dark Indigo-Slate gradient for typography */
            --primary-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            /* Bright Royal Blue to Ocean Blue gradient for main CTA button */
            --cta-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --button-glow: rgba(37, 99, 235, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color-1);
            background-image: radial-gradient(circle at 50% 30%, #ffffff 0%, var(--bg-color-2) 100%);
            font-family: 'Outfit', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Mouse Spotlight glow backdrop */
        .spotlight {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--accent-glow);
            pointer-events: none;
            z-index: 1;
        }

        /* Ambient floating thought particles canvas */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 24px;
            width: 100%;
            max-width: 650px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main Glassmorphic Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 56px 48px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 70px rgba(15, 23, 42, 0.06), 
                        0 0 1px rgba(15, 23, 42, 0.05),
                        inset 0 1px 0 rgba(255, 255, 255, 0.9);
            position: relative;
            overflow: hidden;
            transform: translateY(30px);
            opacity: 0;
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), 
                        border-color 0.5s ease, 
                        box-shadow 0.5s ease;
        }

        /* Top border gradient glow */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 28px;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.4), rgba(79, 70, 229, 0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.8;
            transition: opacity 0.5s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 45px 90px rgba(15, 23, 42, 0.1), 
                        0 0 40px rgba(79, 70, 229, 0.05),
                        inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        .card:hover::before {
            opacity: 1;
        }

        /* Internal light leak ambient glow */
        .card-glow {
            position: absolute;
            width: 240px;
            height: 240px;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            filter: blur(80px);
            top: -90px;
            left: -90px;
            opacity: 0.35;
            pointer-events: none;
            transition: all 0.6s ease;
        }

        .card:hover .card-glow {
            opacity: 0.6;
            transform: translate(40px, 40px) scale(1.2);
        }

        /* Icon styling */
        .icon-wrapper {
            width: 84px;
            height: 84px;
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            border: 1px solid rgba(15, 23, 42, 0.04);
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 36px auto;
            position: relative;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.03);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover .icon-wrapper {
            transform: rotate(-5deg) scale(1.08);
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
            border-color: rgba(79, 70, 229, 0.15);
            box-shadow: 0 12px 28px rgba(79, 70, 229, 0.08);
        }

        .idea-icon {
            width: 44px;
            height: 44px;
            color: #4f46e5;
            filter: drop-shadow(0 4px 8px rgba(79, 70, 229, 0.25));
            animation: pulseGlow 3s infinite ease-in-out;
        }

        /* Gradient title */
        .title {
            font-size: 40px; /* Adjusted to 40px */
            font-weight: 800;
            margin-bottom: 16px;
            line-height: 1.2;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.03em;
            position: relative;
            display: inline-block;
            cursor: text;
            outline: none;
            padding: 4px 10px;
            border-radius: 8px;
            transition: background-color 0.3s ease, opacity 0.2s cubic-bezier(0.16, 1, 0.3, 1), transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            word-break: keep-all;
        }

        .title:hover {
            background-color: rgba(15, 23, 42, 0.02);
        }

        .title:focus {
            background-color: rgba(15, 23, 42, 0.04);
            box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.05);
        }

        /* Text glow backing */
        .title::after {
            content: attr(data-text);
            position: absolute;
            left: 10px;
            top: 4px;
            width: calc(100% - 20px);
            height: 100%;
            z-index: -1;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            filter: blur(14px);
            opacity: 0.12;
            transition: opacity 0.5s ease, opacity 0.2s cubic-bezier(0.16, 1, 0.3, 1), transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .card:hover .title::after {
            opacity: 0.22;
        }

        /* Floating editor tooltip hint */
        .edit-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .title:hover ~ .edit-hint,
        .edit-hint:hover {
            opacity: 1;
            color: var(--text-secondary);
        }

        .edit-icon {
            width: 12px;
            height: 12px;
        }

        /* Subtitle description */
        .subtitle {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 36px;
            word-break: keep-all;
        }

        /* Tags / Badges list */
        .badge-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(15, 23, 42, 0.03);
            border: 1px solid rgba(15, 23, 42, 0.05);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .card:hover .badge {
            background: rgba(79, 70, 229, 0.08);
            border-color: rgba(79, 70, 229, 0.15);
            color: #4f46e5;
        }

        /* Interactive Action Button */
        .cta-button {
            background: var(--cta-gradient);
            color: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 18px 40px;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 25px var(--button-glow),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            z-index: 2;
        }

        /* Shine reflection effect on hover */
        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.6s ease;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.3),
                        0 0 25px rgba(79, 70, 229, 0.15);
        }

        .cta-button:active {
            transform: scale(0.97) translateY(0);
        }

        .btn-arrow {
            width: 18px;
            height: 18px;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cta-button:hover .btn-arrow {
            transform: rotate(180deg);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            0%, 100% {
                filter: drop-shadow(0 4px 8px rgba(79, 70, 229, 0.2));
                transform: scale(1);
            }
            50% {
                filter: drop-shadow(0 6px 16px rgba(79, 70, 229, 0.45));
                transform: scale(1.05);
            }
        }

        /* Responsiveness */
        @media (max-width: 600px) {
            .card {
                padding: 44px 28px;
                border-radius: 24px;
            }
            .title {
                font-size: 32px; /* Scaled down for mobile */
            }
            .subtitle {
                font-size: 0.95rem;
            }
            .cta-button {
                padding: 16px 28px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Floating particle context background -->
    <canvas id="particleCanvas"></canvas>
    
    <!-- Cursor-following light layer -->
    <div class="spotlight"></div>
    
    <main class="container">
        <article class="card" id="ideaCard">
            <div class="card-glow"></div>
            
            <div class="icon-wrapper">
                <!-- Glowing bulb icon -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="idea-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6c0-1.74-.74-3.31-1.91-4.41L15 7.5a3 3 0 0 0-6 0l-.09.84A5.992 5.992 0 0 0 6 12.75a6 6 0 0 0 6 6ZM13.5 20.25h-3c0 .621.504 1.125 1.125 1.125h.75c.621 0 1.125-.504 1.125-1.125Z" />
                </svg>
            </div>
            
            <!-- Editable Title: displays the requested text -->
            <h1 class="title" contenteditable="true" data-text="오늘도 힘내세요!" spellcheck="false" id="ideaTitle">오늘도 힘내세요!</h1>
            
            <div class="edit-hint">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="edit-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" />
                </svg>
                <span>클릭하여 내용을 수정할 수 있습니다</span>
            </div>

            <p class="subtitle">모든 위대한 혁신은 단 하나의 작은 생각에서 시작됩니다. 화면의 빈 곳을 마우스로 클릭하거나 터치하여 반짝이는 아이디어의 불꽃을 피워보세요.</p>
            
            <div class="badge-container">
                <span class="badge">Idea Spark</span>
                <span class="badge">Creative Space</span>
                <span class="badge">Innovation</span>
            </div>
            
            <!-- Next Quote Trigger Button (Renamed & Styled from exploreBtn) -->
            <button class="cta-button" id="exploreBtn">
                <span>다음 문장 보기</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="btn-arrow">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
            </button>
        </article>
    </main>

    <script>
        // --- 1. Cursor Spotlight Position Handler ---
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mouse-x', `${x}%`);
            document.documentElement.style.setProperty('--mouse-y', `${y}%`);
        });

        // --- 2. Interactive Title Storage & Editor Management ---
        const titleEl = document.getElementById('ideaTitle');
        const defaultText = '오늘도 힘내세요!';

        // Load saved idea from client local storage
        const savedIdea = localStorage.getItem('dailyCheerText');
        if (savedIdea) {
            titleEl.textContent = savedIdea;
            titleEl.setAttribute('data-text', savedIdea);
        } else {
            titleEl.textContent = defaultText;
            titleEl.setAttribute('data-text', defaultText);
        }

        // Save text changes automatically on blur (focus lost)
        titleEl.addEventListener('blur', () => {
            let text = titleEl.textContent.trim();
            if (!text) {
                text = defaultText;
                titleEl.textContent = text;
            }
            localStorage.setItem('dailyCheerText', text);
            titleEl.setAttribute('data-text', text);
        });

        // Save on hitting 'Enter' key and trigger blur
        titleEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                titleEl.blur();
            }
        });

        // Quotes rotation bank
        const quotes = [
            "오늘도 힘내세요!",
            "당신의 모든 아이디어가 현실이 됩니다.",
            "새로운 도전을 두려워하지 마세요.",
            "포기하지 않는 열정이 답을 만들어냅니다.",
            "오늘 하루도 가장 당신답게 보내세요.",
            "작은 생각이 세상을 바꿀 큰 시작입니다."
        ];
        let currentQuoteIndex = quotes.indexOf(titleEl.textContent) !== -1 ? quotes.indexOf(titleEl.textContent) : 0;

        const exploreBtn = document.getElementById('exploreBtn');
        exploreBtn.addEventListener('click', () => {
            currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
            const newQuote = quotes[currentQuoteIndex];
            
            // Trigger smooth transition
            titleEl.style.opacity = 0;
            titleEl.style.transform = 'translateY(-8px)';
            
            setTimeout(() => {
                titleEl.textContent = newQuote;
                titleEl.setAttribute('data-text', newQuote);
                localStorage.setItem('dailyCheerText', newQuote);
                
                titleEl.style.opacity = 1;
                titleEl.style.transform = 'translateY(0)';
                
                // Trigger sparks at the button
                const rect = exploreBtn.getBoundingClientRect();
                createSparks(rect.left + rect.width / 2, rect.top + rect.height / 2);
            }, 200);
        });

        // --- 3. Interactive Particles & Spark Canvas Engine ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let sparks = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Slow ambient rising ideas
        class Particle {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height; // spread initially so they don't start only at the bottom
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = -(Math.random() * 0.4 + 0.15);
                this.speedX = Math.random() * 0.3 - 0.15;
                this.alpha = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y < -10) {
                    this.reset();
                }
            }
            draw() {
                // Subtle grayish blue / slate particles
                ctx.fillStyle = `rgba(71, 85, 105, ${this.alpha * 0.3})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Fast sparks emitted upon clicking
        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3.5 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4.5 + 1.5;
                this.speedX = Math.cos(angle) * speed;
                this.speedY = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.012;
                // Elegant Indigo/Purple Hue Spectrum (230 to 270)
                const hue = [230, 245, 260, 270][Math.floor(Math.random() * 4)] + (Math.random() * 10 - 5);
                this.color = `hsl(${hue}, 85%, 60%)`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.04; // gravity force
                this.alpha -= this.decay;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Initialize background particles
        const particleCount = Math.min(Math.floor(window.innerWidth / 30), 50);
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // Screen Click listener (spawns sparks)
        window.addEventListener('click', (e) => {
            // Avoid spawning sparks if clicking directly on interactive elements like input fields or buttons
            if (e.target.closest('button') || e.target.closest('.title')) return;
            createSparks(e.clientX, e.clientY);
        });

        // Touch listener for mobile devices
        window.addEventListener('touchstart', (e) => {
            if (e.target.closest('button') || e.target.closest('.title')) return;
            const touch = e.touches[0];
            createSparks(touch.clientX, touch.clientY);
        });

        function createSparks(x, y) {
            const count = Math.random() * 10 + 12;
            for (let i = 0; i < count; i++) {
                sparks.push(new Spark(x, y));
            }
        }

        // Animation Loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Render ambient floating particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            // Render sparks
            for (let i = sparks.length - 1; i >= 0; i--) {
                const s = sparks[i];
                s.update();
                if (s.alpha <= 0) {
                    sparks.splice(i, 1);
                } else {
                    s.draw();
                }
            }
            
            requestAnimationFrame(animate);
        }
        animate();

        // exploreBtn click event logic is handled above in the quote rotation block.
    </script>
</body>
</html>
